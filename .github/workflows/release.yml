name: 🆙 Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Release type
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write # <-- Enables push
      packages: write # <-- Required for pushing to GHCR

    env:
      PYTHON_VERSION: 3.14

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Generate client and build
        run: |
          npm run generate-client
          npm run build

      - name: Create release commit and tag
        id: create-commits
        run: |
          git config user.name 'yak-toto'
          git config user.email 'yaktoto648@gmail.com'

          npm version "${RELEASE_TYPE}" -m "Release %s"
          VERSION=$(node -p "require('./package.json').version")

          echo "new-version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}

      - name: Push changes
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.3.0
        with:
          tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.create-commits.outputs.new-version }}

      - name: Zip dist
        run: cd dist && zip -r ../yak-display-v${{ steps.create-commits.outputs.new-version }}.zip .

      - name: Create GitHub Release
        id: create-release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: 'yak-display-v${{ steps.create-commits.outputs.new-version }}.zip'
          generateReleaseNotes: true
          tag: v${{ steps.create-commits.outputs.new-version }}

      - name: Send Release Notification to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ steps.create-commits.outputs.new-version }}
          RELEASE_URL: ${{ steps.create-release.outputs.html_url }}
          REPO: ${{ github.repository }}
        run: |-
          FULL_MESSAGE="🎉 New Release: ${RELEASE_TAG}
          📁 Repository: ${REPO}
          🔗 ${RELEASE_URL}"

          curl -s -o /dev/null -S -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${FULL_MESSAGE}\",
              \"disable_web_page_preview\": true
            }"
